version: '3.8'

services:
  backend:
    image: wettkampf-backend:latest
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - CORS_ORIGINS=http://localhost:5173,http://frontend:5173
    volumes:
      - ./Backend/data:/app/data
    networks:
      - wettkampf-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/api/config"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  frontend:
    image: wettkampf-frontend:latest
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - wettkampf-network
    environment:
      - VITE_API_URL=http://localhost:3001
    restart: unless-stopped

networks:
  wettkampf-network:
    driver: bridge
