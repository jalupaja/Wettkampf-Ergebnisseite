services:
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - CORS_ORIGINS=http://localhost:5173,http://frontend:5173
    volumes:
      - backend-data:/app/src/data
    networks:
      - wettkampf-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://0.0.0.0:3001/api/config"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    ports:
      - "5173:4173"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - wettkampf-network
    environment:
      - VITE_API_URL=http://localhost:3001
    restart: unless-stopped

networks:
  wettkampf-network:
    driver: bridge

volumes:
  backend-data:
