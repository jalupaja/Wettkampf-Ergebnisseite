services:
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - CORS_ORIGINS=http://localhost:5173,http://frontend:5173
      - DEBUG_ALLOW_CORS=true
    volumes:
      - backend-data:/app/src/data
    networks:
      - wettkampf-network
    restart: unless-stopped

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://backend:3001
    ports:
      - "5173:4173"
    depends_on:
      - backend
    networks:
      - wettkampf-network
    environment:
      - VITE_API_URL=http://backend:3001
      - FRONTEND_PORT=4173
    restart: unless-stopped

networks:
  wettkampf-network:
    driver: bridge

volumes:
  backend-data:
