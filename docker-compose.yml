services:
  backend:
    build:
      context: .
      dockerfile: Backend/Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - CORS_ORIGINS=http://localhost:5173,http://frontend:5173
    volumes:
      - backend-data:/app/src/data
    networks:
      - wettkampf-network
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Frontend/Dockerfile
    ports:
      - "5173:4173"
    environment:
      - VITE_API_URL=http://backend:3001
    depends_on:
      - backend
    networks:
      - wettkampf-network
    restart: unless-stopped

networks:
  wettkampf-network:
    driver: bridge

volumes:
  backend-data:
    driver: local
